# Configuration Schema
# --------------------
#
# Remote Adapters:
#   service_url (required): HTTP(S) URL of the remote adapter service
#   domain (required): Domain type - must be one of: notes, messages, events, tasks
#   adapter_id (required): Unique identifier for this adapter instance
#   api_key (optional): Bearer token for authentication. Omit or set to null if not needed
#   normalizer_version (optional): Version of the normalization algorithm. Default: "1.0.0"
#   timeout (optional): HTTP request timeout in seconds. Default: 30.0
#
# Local Adapters:
#   adapter_type (required): Type of adapter - filesystem, obsidian, email, caldav, etc.
#   domain (required): Domain type - must be one of: notes, messages, events, tasks
#   adapter_id (required): Unique identifier for this adapter instance
#   config (optional): Dict of adapter-specific configuration parameters
#
# Domains:
#   - notes: Document and note content
#   - messages: Email and messaging content
#   - events: Calendar events
#   - tasks: Task lists and TODO items

# Validation Rules
# ----------------
# - All adapter_ids must be unique (across both remote and local)
# - At least one adapter must be defined
# - service_url must start with http:// or https://
# - timeout must be a positive number
# - domain must be a valid Domain value
