# Example Adapter Configuration File
#
# This file demonstrates how to declaratively configure both remote and local
# adapters using YAML. The configuration is loaded at runtime and instantiates
# adapter objects without requiring Python code.
#
# Supported Formats: YAML (.yaml, .yml), TOML (.toml), JSON (.json)

# Remote adapters: services accessed via HTTP
remote_adapters:
  # Example: Obsidian vault on a Mac server
  - service_url: http://mac-server:8001
    domain: notes
    adapter_id: obsidian:vault
    api_key: shared-secret-key  # Store sensitive values securely; env var interpolation not yet supported
    normalizer_version: "1.0.0"
    timeout: 30.0

  # Example: Email adapter on a remote Mac server
  - service_url: https://mac-server:8002
    domain: messages
    adapter_id: mail:primary
    normalizer_version: "1.0.0"
    timeout: 60.0

# Local adapters: directly instantiated from the context_library
local_adapters:
  # Example: Filesystem adapter reading from local directory
  - adapter_type: filesystem
    domain: notes
    adapter_id: local:documents
    config:
      directory: /home/user/Documents

  # Example: Another filesystem adapter
  - adapter_type: filesystem
    domain: notes
    adapter_id: local:calendar
    config:
      directory: /home/user/Calendar

