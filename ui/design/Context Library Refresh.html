<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1400, initial-scale=1" />
  <title>Context Library · Refresh (heimdall components)</title>
  <link rel="stylesheet" href="heimdall/heimdall.css" />
  <link rel="stylesheet" href="cl/cl-app.css" />
  <style>
    .artboard { position: relative; width: 100%; height: 100%; }
  </style>
</head>
<body>
  <div id="app"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="design-canvas.jsx"></script>

  <!-- Real heimdall design-system components, ported from @tinkermonkey/heimdall-ui -->
  <script type="text/babel" src="heimdall/primitives.jsx"></script>
  <script type="text/babel" src="heimdall/shell.jsx"></script>
  <script type="text/babel" src="heimdall/data.jsx"></script>
  <script type="text/babel" src="heimdall/panels.jsx"></script>
  <script type="text/babel" src="heimdall/charts.jsx"></script>

  <!-- Context Library screens, rebuilt on the real components -->
  <script type="text/babel" src="cl/Shell.jsx"></script>
  <script type="text/babel" src="cl/Overview.jsx"></script>
  <script type="text/babel" src="cl/Search.jsx"></script>
  <script type="text/babel" src="cl/Sources.jsx"></script>
  <script type="text/babel" src="cl/SourceDetail.jsx"></script>
  <script type="text/babel" src="cl/ChunkInspector.jsx"></script>
  <script type="text/babel" src="cl/Notes.jsx"></script>
  <script type="text/babel" src="cl/Messages.jsx"></script>
  <script type="text/babel" src="cl/Events.jsx"></script>
  <script type="text/babel" src="cl/Tasks.jsx"></script>
  <script type="text/babel" src="cl/Documents.jsx"></script>
  <script type="text/babel" src="cl/Health.jsx"></script>
  <script type="text/babel" src="cl/Location.jsx"></script>
  <script type="text/babel" src="cl/People.jsx"></script>
  <script type="text/babel" src="cl/Music.jsx"></script>
  <script type="text/babel" src="cl/Adapters.jsx"></script>

  <script type="text/babel">
    const W = 1440, H = 900;
    function Wrap({ children }) { return <div className="artboard">{children}</div>; }

    function App() {
      return (
        <DesignCanvas
          title="Context Library — Refresh × heimdall components"
          subtitle="Every screen rebuilt on the real @tinkermonkey/heimdall-ui components as they exist today (ShellLayout, Sidebar, Topbar, StatTile, Table, PipelineCard, FilterDropdown, LineChart, KVGrid, InspectorPanel, …). Reconciled to the current heimdall design system, surface flags read three ways: green 'heimdall · X' = the pattern now ships in the kit (Calendar, KanbanBoard, MapCanvas, DiffViewer/HashSetDiff/SideBySideDiff, VersionTimeline, LineageRail, ResultCard, AssetCard/Grid, LogStream, Avatar); violet 'reuse · X' = refactor onto an existing component (HierarchyTree, StackedBar, ChatMessage, ConfigTile, MetricRow, Sidebar); rose 'custom' = an app-level composition the kit has no component for."
        >
          <DCSection id="primary" title="Primary workspace" subtitle="The three screens users live in. Overview anchors the homelab, Search is the centerpiece query surface, Sources is the data browser.">
            <DCArtboard id="overview" label="01 · Overview" width={W} height={H}><Wrap><OverviewScreen/></Wrap></DCArtboard>
            <DCArtboard id="search" label="02 · Semantic search" width={W} height={H}><Wrap><SearchScreen/></Wrap></DCArtboard>
            <DCArtboard id="sources" label="03 · Sources browser" width={W} height={H}><Wrap><SourcesScreen/></Wrap></DCArtboard>
          </DCSection>

          <DCSection id="versioning" title="Versioning & provenance" subtitle="The Context Library superpower. Hash-set diffs, side-by-side content diff, single-chunk provenance with full ancestry.">
            <DCArtboard id="source-detail" label="04 · Source detail · v2 → v3 diff" width={W} height={H}><Wrap><SourceDetailScreen/></Wrap></DCArtboard>
            <DCArtboard id="chunk-inspector" label="05 · Chunk inspector · provenance" width={W} height={H}><Wrap><ChunkInspectorScreen/></Wrap></DCArtboard>
          </DCSection>

          <DCSection id="domains" title="Domain views — all 9 domains" subtitle="Each domain renders sources in its native shape — calendar grid for Events, kanban for Tasks, time-series for Health, map for Location, etc. The version pill, chunk markers, and lineage rail stay consistent across all of them.">
            <DCArtboard id="notes" label="06 · Notes · three-pane" width={W} height={H}><Wrap><NotesScreen/></Wrap></DCArtboard>
            <DCArtboard id="messages" label="07 · Messages · thread reader" width={W} height={H}><Wrap><MessagesScreen/></Wrap></DCArtboard>
            <DCArtboard id="events" label="08 · Events · calendar" width={W} height={H}><Wrap><EventsScreen/></Wrap></DCArtboard>
            <DCArtboard id="tasks" label="09 · Tasks · kanban + lifecycle" width={W} height={H}><Wrap><TasksScreen/></Wrap></DCArtboard>
            <DCArtboard id="documents" label="10 · Documents · catalog" width={W} height={H}><Wrap><DocumentsScreen/></Wrap></DCArtboard>
            <DCArtboard id="health" label="11 · Health · metrics dashboard" width={W} height={H}><Wrap><HealthScreen/></Wrap></DCArtboard>
            <DCArtboard id="location" label="12 · Location · map + visits" width={W} height={H}><Wrap><LocationScreen/></Wrap></DCArtboard>
            <DCArtboard id="people" label="13 · People · contact directory" width={W} height={H}><Wrap><PeopleScreen/></Wrap></DCArtboard>
            <DCArtboard id="music" label="14 · Music · listening history" width={W} height={H}><Wrap><MusicScreen/></Wrap></DCArtboard>
          </DCSection>

          <DCSection id="system" title="System & pipeline" subtitle="Admin surface for adapter health, ingest pipeline runs, and the dual-store sync log.">
            <DCArtboard id="adapters" label="15 · Adapters · pipeline runs" width={W} height={H}><Wrap><AdaptersScreen/></Wrap></DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }

    ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
  </script>
</body>
</html>
